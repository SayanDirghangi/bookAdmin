<div class="container">
<form class="form-container" [formGroup]="taskForm">
    <div class="form-group">
        <label for="taskName">Your Name:</label>
        <input type="text" class="form-control" id="taskName" placeholder="Enter your name" formControlName="name">
    </div>
    <div class="form-group">
        <label for="phoneNumber">Phone Number:</label>
        <input type="text" class="form-control" id="phoneNumber" placeholder="Enter your phone number" formControlName="number">
    </div>
    <div class="form-group">
        <label for="taskName">Task Name:</label>
        <input type="text" class="form-control" id="taskName" placeholder="Enter task name" formControlName="taskName">
    </div>
    <div class="form-group">
        <label for="taskDescription">Task Description:</label>
        <textarea class="form-control" id="taskDescription" rows="3" placeholder="Enter task description" formControlName="description"></textarea>
    </div>
    <button type="submit" (click)="onSubmit()" class="btn btn-primary">Create Task</button>
</form>
</div>
